world:
  name: "citybuild"
  seed: 0              # 0 = zufällig

generator:
  map-radius: 1500
  road-width-main: 8
  road-width-secondary: 5
  plot-min-size: 16
  plot-max-size: 48
  district-count: 10

plots:
  price-per-block: 10.0
  location-multiplier: 1.5   # Zentrum teurer
  max-plots-per-player: 3    # 0 = unbegrenzt
  currency-symbol: "$"

spawn:
  x: 0.5
  y: 65.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

protection:
  protect-unclaimed: true
  prevent-pvp: true
  prevent-fire-spread: true
  prevent-mob-grief: true

messages:
  prefix: "&8[&6City&eBuild&8] &r"
  no-permission: "&cKeine Berechtigung."
  plot-bought: "&aGrundstück &e#{id} &akauft für &e{price}{currency}&a!"
  plot-sold: "&aGrundstück &e#{id} &averkauft!"
  not-enough-money: "&cNicht genug Geld. Benötigt: &e{price}{currency}"
  not-on-plot: "&cDu stehst auf keinem Grundstück."
  already-owned: "&cDieses Grundstück gehört bereits jemandem."
  not-owner: "&cDu bist nicht Eigentümer dieses Grundstücks."
  spawn-set: "&aSpawnpunkt gesetzt."
  player-trusted: "&a{player} &avertraut."
  player-kicked: "&a{player} &aentfernt."
  max-plots: "&cMaximale Grundstückszahl (&e{max}&c) erreicht."

database:
  type: SQLITE        # SQLITE oder MYSQL
  mysql:
    host: localhost
    port: 3306
    database: citybuild
    username: root
    password: ""
    pool-size: 10
